<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon-96x96.png" type="image/png">
    <link id="dynamic-favicon" rel="icon" type="image/png" href="/web-app-manifest-512x512.png" sizes="512x512" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const darkQuery = window.matchMedia('(prefers-color-scheme: dark)')

        const clearExistingFavicons = () => {
          document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]').forEach((el) => {
            el.remove()
          })
        }

        const appendFavicon = (rel, href, sizes) => {
          const link = document.createElement('link')
          link.rel = rel
          link.type = 'image/png'
          link.href = `${href}?v=${Date.now()}`
          if (sizes) link.sizes = sizes
          document.head.appendChild(link)
        }

        const applyFavicon = (isDark) => {
          clearExistingFavicons()
          if (isDark) {
            appendFavicon('icon', '/web-app-manifest-512x512.png', '512x512')
          } else {
            appendFavicon('icon', '/favicon-96x96.png', '96x96')
          }
        }

        applyFavicon(darkQuery.matches)

        if (typeof darkQuery.addEventListener === 'function') {
          darkQuery.addEventListener('change', (event) => applyFavicon(event.matches))
        } else if (typeof darkQuery.addListener === 'function') {
          darkQuery.addListener((event) => applyFavicon(event.matches))
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tony Foulquier</title>
    <meta name="description" content="Photographe et directeur artistique spécialisé en portrait, commercial et éditorial, basé à Paris.">
    <meta name="keywords" content="Tony Foulquier, photographer, artistic director Paris, France">
    <meta name="author" content="Tony Foulquier">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="yandexbot" content="index, follow">
    <meta name="sitemap" content="https://tonyfoulquier.com/sitemap.xml">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
